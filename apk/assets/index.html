<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Tookies</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{margin:0;padding:0;height:100%;width:100%;background:#fff;color:#222;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Roboto,sans-serif;overflow:hidden}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;background:#fff}
  /* Toolbar (back arrow on tool pages) */
  .topbar{height:48px;display:flex;align-items:center;padding:0 8px;background:#fff;border-bottom:1px solid #f0f0f0;flex-shrink:0}
  .topbar.hidden{display:none}
  .back{width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px}
  .back:active{background:#f0f0f0}
  .back svg{width:22px;height:22px;fill:none;stroke:#222;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .topbar .title{font-size:17px;font-weight:600;margin-left:4px}
  /* Views */
  .view{flex:1;display:none;position:relative;overflow:hidden}
  .view.active{display:flex;flex-direction:column}
  /* Home: 3-col waterfall grid */
  #view-home{background:#fafafa;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .home-header{padding:24px 16px 12px;font-size:22px;font-weight:700;color:#222}
  .home-sub{padding:0 16px 16px;font-size:13px;color:#888}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 24px}
  .tile{background:#fff;border-radius:14px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .08s}
  .tile:active{transform:scale(.96);background:#f7f7f7}
  .tile-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#222}
  .tile-icon svg{width:34px;height:34px;stroke:#222;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .tile-label{font-size:12px;color:#444;font-weight:500}
  /* Paint page */
  #view-paint{background:#fff}
  .paint-toolbar{height:56px;display:flex;align-items:center;padding:6px 8px;gap:8px;background:#fff;border-top:1px solid #eee;flex-shrink:0}
  .palette{display:flex;gap:6px;align-items:center;flex-shrink:0}
  .swatch{width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #ddd;cursor:pointer;flex-shrink:0}
  .swatch.active{box-shadow:0 0 0 2px #222}
  .divider{width:1px;height:24px;background:#eee;flex-shrink:0}
  .slider-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .slider-wrap label{font-size:11px;color:#888;flex-shrink:0}
  input[type=range]{flex:1;min-width:60px;height:24px;-webkit-appearance:none;background:transparent}
  input[type=range]::-webkit-slider-runnable-track{height:3px;background:#ddd;border-radius:2px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#222;margin-top:-7.5px;cursor:pointer}
  .px-val{font-size:11px;color:#666;width:24px;text-align:right;flex-shrink:0}
  .icon-btn{width:36px;height:36px;border-radius:8px;background:#f5f5f5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .icon-btn:active{background:#e0e0e0}
  .icon-btn svg{width:20px;height:20px;stroke:#222;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .icon-btn.danger{background:#fee;color:#c33}
  .icon-btn.danger:active{background:#fcc}
  canvas{flex:1;display:block;background:#fff;touch-action:none}
  /* Ruler page */
  #view-ruler{background:#fff;overflow:hidden;position:relative}
  .ruler-frame{flex:1;display:flex;flex-direction:column;position:relative}
  .ruler-h{height:34px;background:#fff;border-bottom:1px solid #e8e8e8;position:relative;overflow:hidden;flex-shrink:0}
  .ruler-h svg{width:100%;height:100%;display:block}
  .ruler-mid{flex:1;display:flex;background:#fff;overflow:hidden}
  .ruler-v{flex:1;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#fff,#fff 10px,#fafafa 10px,#fafafa 20px);position:relative;min-width:0}
  .ruler-v .info{color:#999;font-size:13px;text-align:center;padding:12px}
  .ruler-v .info b{color:#333;font-weight:600}
  /* small landscape label */
  .ruler-frame.landscape .ruler-mid{flex-direction:row}
  .ruler-frame.portrait .ruler-mid{flex-direction:column}
</style>
</head>
<body>
<div id="app">
  <!-- Tool pages share a topbar -->
  <div class="topbar" id="topbar">
    <div class="back" id="backBtn" title="返回">
      <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </div>
    <div class="title" id="topTitle">Tookies</div>
  </div>

  <!-- HOME -->
  <div class="view" id="view-home">
    <div class="home-header">Tookies</div>
    <div class="home-sub">轻量小工具集 · 点击卡片进入</div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- PAINT -->
  <div class="view" id="view-paint">
    <canvas id="cv"></canvas>
    <div class="paint-toolbar">
      <div class="palette" id="palette"></div>
      <div class="divider"></div>
      <div class="slider-wrap">
        <label>粗细</label>
        <input type="range" id="size" min="1" max="30" value="2">
        <div class="px-val" id="sizeVal">2</div>
      </div>
      <div class="divider"></div>
      <button class="icon-btn" id="eraserBtn" title="橡皮擦">
        <svg viewBox="0 0 24 24"><path d="M16 4l4 4-9 9H7l-3-3 9-10z"/><line x1="8" y1="20" x2="20" y2="20"/></svg>
      </button>
      <button class="icon-btn" id="undoBtn" title="撤销">
        <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 1 1 0 10h-4"/></svg>
      </button>
      <button class="icon-btn" id="redoBtn" title="恢复">
        <svg viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 1 0 0 10h4"/></svg>
      </button>
      <button class="icon-btn danger" id="clearBtn" title="清屏">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  </div>

  <!-- RULER -->
  <div class="view" id="view-ruler">
    <div class="ruler-frame" id="rulerFrame">
      <div class="ruler-h"><svg id="rulerHSvg" viewBox="0 0 1000 34" preserveAspectRatio="none"></svg></div>
      <div class="ruler-mid">
        <div class="ruler-v">
          <div class="info">
            <div>📐 屏幕尺</div>
            <div style="margin-top:6px">设备物理宽度 <b id="devW">—</b></div>
            <div>设备物理高度 <b id="devH">—</b></div>
            <div style="margin-top:6px">屏幕对角线 <b id="diag">—</b></div>
          </div>
        </div>
      </div>
      <div class="ruler-h"><svg id="rulerHSvg2" viewBox="0 0 1000 34" preserveAspectRatio="none"></svg></div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  /* ───────── Routing ───────── */
  var TOOLS = [
    {id:'paint', label:'简易画板', icon:'<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="6" cy="6" r="1.5" fill="#222" stroke="none"/></svg>'},
    {id:'ruler', label:'屏幕尺', icon:'<svg viewBox="0 0 24 24"><rect x="2" y="9" width="20" height="6" rx="1"/><line x1="6" y1="9" x2="6" y2="13"/><line x1="10" y1="9" x2="10" y2="11"/><line x1="14" y1="9" x2="14" y2="13"/><line x1="18" y1="9" x2="18" y2="11"/></svg>'}
  ];
  var grid = document.getElementById('grid');
  TOOLS.forEach(function(t){
    var el = document.createElement('div');
    el.className = 'tile';
    el.innerHTML = '<div class="tile-icon">'+t.icon+'</div><div class="tile-label">'+t.label+'</div>';
    el.addEventListener('click', function(){ location.hash = '#'+t.id; });
    grid.appendChild(el);
  });
  var currentTool = null;
  var topbar = document.getElementById('topbar');
  var topTitle = document.getElementById('topTitle');
  var backBtn = document.getElementById('backBtn');
  function show(viewId, title){
    [].forEach.call(document.querySelectorAll('.view'), function(v){ v.classList.remove('active'); });
    document.getElementById(viewId).classList.add('active');
    if(viewId === 'view-home'){
      topbar.classList.add('hidden');
    } else {
      topbar.classList.remove('hidden');
      topTitle.textContent = title || '';
    }
    currentTool = viewId === 'view-home' ? null : viewId.replace('view-','');
    if(currentTool === 'paint') paintResize();
    if(currentTool === 'ruler') rulerInit();
    location.hash = viewId === 'view-home' ? '' : '#'+currentTool;
  }
  backBtn.addEventListener('click', function(){ show('view-home'); });
  function route(){
    var h = location.hash.replace('#','');
    if(h === 'paint') show('view-paint', '简易画板');
    else if(h === 'ruler') show('view-ruler', '屏幕尺');
    else show('view-home');
  }
  window.addEventListener('hashchange', route);

  /* ───────── Paint ───────── */
  var cv, ctx, sizeEl, sizeVal, eraserBtn, undoBtn, redoBtn, clearBtn, paletteEl;
  var strokes = [];      // committed strokes
  var redoStack = [];
  var current = null;    // active stroke
  var drawing = false;
  var currentColor = '#000000';
  var currentSize = 2;
  var isEraser = false;
  function paintResize(){
    cv = document.getElementById('cv');
    if(!cv) return;
    var rect = cv.getBoundingClientRect();
    // Resize backing store; re-render strokes (assume identity mapping)
    if(cv.width !== rect.width || cv.height !== rect.height){
      cv.width = Math.floor(rect.width);
      cv.height = Math.floor(rect.height);
      redrawAll();
    }
  }
  function drawStroke(s){
    if(!s.points.length) return;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for(var i=1;i<s.points.length;i++) ctx.lineTo(s.points[i].x, s.points[i].y);
    if(s.points.length === 1){
      // dot
      ctx.arc(s.points[0].x, s.points[0].y, s.size/2, 0, Math.PI*2);
      ctx.fillStyle = s.color;
      ctx.fill();
    } else {
      ctx.stroke();
    }
  }
  function redrawAll(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<strokes.length;i++) drawStroke(strokes[i]);
  }
  function getPos(e){
    var r = cv.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return {x: t.clientX - r.left, y: t.clientY - r.top};
  }
  function paintStart(e){
    e.preventDefault();
    drawing = true;
    redoStack.length = 0;
    var p = getPos(e);
    current = {
      color: isEraser ? '#ffffff' : currentColor,
      size: currentSize,
      points: [p]
    };
    strokes.push(current);
    drawStroke(current);
  }
  function paintMove(e){
    if(!drawing) return;
    e.preventDefault();
    var p = getPos(e);
    var last = current.points[current.points.length-1];
    // throttle: skip near-duplicate points (within 1.5px)
    if(Math.abs(p.x-last.x)<1.5 && Math.abs(p.y-last.y)<1.5) return;
    current.points.push(p);
    // incremental: draw segment from last to p
    ctx.strokeStyle = current.color;
    ctx.lineWidth = current.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  function paintEnd(e){
    if(!drawing) return;
    e && e.preventDefault();
    drawing = false;
    // collapse empty strokes
    if(current && current.points.length === 0) strokes.pop();
    current = null;
  }
  function setColor(c, el){
    currentColor = c;
    isEraser = false;
    eraserBtn.classList.remove('active');
    eraserBtn.style.background = '#f5f5f5';
    [].forEach.call(paletteEl.querySelectorAll('.swatch'), function(s){ s.classList.remove('active'); });
    el.classList.add('active');
  }
  function setEraser(){
    isEraser = true;
    [].forEach.call(paletteEl.querySelectorAll('.swatch'), function(s){ s.classList.remove('active'); });
    eraserBtn.style.background = '#222';
  }
  function paintInit(){
    cv = document.getElementById('cv');
    ctx = cv.getContext('2d');
    sizeEl = document.getElementById('size');
    sizeVal = document.getElementById('sizeVal');
    eraserBtn = document.getElementById('eraserBtn');
    undoBtn = document.getElementById('undoBtn');
    redoBtn = document.getElementById('redoBtn');
    clearBtn = document.getElementById('clearBtn');
    paletteEl = document.getElementById('palette');
    // build palette
    var colors = ['#000000','#e53935','#fb8c00','#fdd835','#43a047','#1e88e5','#8e24aa','#ffffff'];
    colors.forEach(function(c, i){
      var sw = document.createElement('div');
      sw.className = 'swatch' + (i===0 ? ' active':'');
      sw.style.background = c;
      sw.dataset.color = c;
      sw.addEventListener('click', function(){ setColor(c, sw); });
      paletteEl.appendChild(sw);
    });
    sizeEl.addEventListener('input', function(){
      currentSize = parseInt(sizeEl.value,10);
      sizeVal.textContent = currentSize;
    });
    eraserBtn.addEventListener('click', setEraser);
    undoBtn.addEventListener('click', function(){
      if(strokes.length){ redoStack.push(strokes.pop()); redrawAll(); }
    });
    redoBtn.addEventListener('click', function(){
      if(redoStack.length){ strokes.push(redoStack.pop()); redrawAll(); }
    });
    clearBtn.addEventListener('click', function(){
      if(!strokes.length) return;
      if(confirm('确定清空画板？')){
        strokes.length = 0; redoStack.length = 0; redrawAll();
      }
    });
    cv.addEventListener('touchstart', paintStart, {passive:false});
    cv.addEventListener('mousedown', paintStart);
    cv.addEventListener('touchmove', paintMove, {passive:false});
    cv.addEventListener('mousemove', paintMove);
    cv.addEventListener('touchend', paintEnd);
    cv.addEventListener('mouseup', paintEnd);
    cv.addEventListener('mouseleave', paintEnd);
    window.addEventListener('resize', paintResize);
    paintResize();
  }

  /* ───────── Ruler ───────── */
  // Determine physical screen size.
  // window.screen.width/height are CSS pixels on Android WebView (== device px divided by DPR? No — screen.* are CSS px).
  // Actually on Android WebView: window.screen.width = CSS px, but to get device px, use screen.width * devicePixelRatio.
  // For physical mm/inches, we use: pixels / (dpi). DPI = devicePixelRatio * 160.
  function rulerInit(){
    var dpr = window.devicePixelRatio || 1;
    var cssW = window.screen.width;   // CSS px (= device-independent px = dp)
    var cssH = window.screen.height;
    var devW = cssW * dpr;            // device px
    var devH = cssH * dpr;
    var dpi = dpr * 160;
    var wInch = devW / dpi;
    var hInch = devH / dpi;
    var diag = Math.sqrt(wInch*wInch + hInch*hInch);
    document.getElementById('devW').textContent = cssW.toFixed(0) + ' dp × ' + devW.toFixed(0) + ' px';
    document.getElementById('devH').textContent = cssH.toFixed(0) + ' dp × ' + devH.toFixed(0) + ' px';
    document.getElementById('diag').textContent = diag.toFixed(2) + ' in · ' + (diag*2.54).toFixed(1) + ' cm';
    // Build horizontal rulers at top and bottom: length is cssW (CSS px).
    // Choose cm as the primary unit (most readable on phones).
    // 1 inch = dpi px. Use device-pixel-per-cm = dpi/2.54.
    var pxPerCm = dpi / 2.54;
    var pxPerMm = dpi / 25.4;
    // We'll render in viewBox 0..cssW x 0..34 (34 high). Major ticks every 1cm, minor every 5mm, tiny every 1mm.
    var svg1 = document.getElementById('rulerHSvg');
    var svg2 = document.getElementById('rulerHSvg2');
    [svg1, svg2].forEach(function(svg){
      svg.setAttribute('viewBox', '0 0 '+cssW+' 34');
      var totalCm = cssW / pxPerCm;
      var lines = '';
      // baseline
      lines += '<line x1="0" y1="34" x2="'+cssW+'" y2="34" stroke="#222" stroke-width="0.5"/>';
      // ticks
      for(var mm=0; mm<=Math.ceil(totalCm*10); mm++){
        var x = mm * pxPerMm;
        if(x > cssW) break;
        var major = (mm % 10 === 0);
        var minor = (mm % 5 === 0);
        var h = major ? 18 : (minor ? 11 : 6);
        var col = major ? '#222' : '#666';
        var sw = major ? 0.7 : 0.4;
        lines += '<line x1="'+x.toFixed(2)+'" y1="'+(34-h)+'" x2="'+x.toFixed(2)+'" y2="34" stroke="'+col+'" stroke-width="'+sw+'"/>';
        if(major){
          var cm = mm/10;
          // alternate label height
          var ly = (cm % 2 === 0) ? 12 : 6;
          lines += '<text x="'+(x+1).toFixed(2)+'" y="'+ly+'" font-size="9" fill="#222" font-family="sans-serif">'+cm+'</text>';
        }
      }
      svg.innerHTML = lines;
    });
  }

  /* ───────── Boot ───────── */
  paintInit();
  route();
})();
</script>
</body>
</html>
