<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Tookies</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;padding:0;height:100%;width:100%;background:#fff;color:#222;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Roboto,sans-serif;overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#fff}
.topbar{height:44px;display:flex;align-items:center;padding:0 6px;background:#fff;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.topbar.hidden{display:none}
.back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px}
.back:active{background:#f0f0f0}
.back svg{width:20px;height:20px;fill:none;stroke:#222;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.topbar .title{font-size:16px;font-weight:600;margin-left:2px}
.view{flex:1;display:none;position:relative;overflow:hidden}
.view.active{display:flex;flex-direction:column}
/* Home */
#view-home{background:#fafafa;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-header{padding:24px 16px 8px;font-size:22px;font-weight:700}
.home-sub{padding:0 16px 16px;font-size:13px;color:#888}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 24px}
.tile{background:#fff;border-radius:14px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .08s}
.tile:active{transform:scale(.96);background:#f7f7f7}
.tile-icon svg{width:34px;height:34px;stroke:#222;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tile-label{font-size:12px;color:#444;font-weight:500}
/* Paint toolbar — single row */
.paint-toolbar{height:50px;display:flex;align-items:center;padding:0 6px;gap:5px;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.color-btn{width:34px;height:34px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px #ccc;cursor:pointer;flex-shrink:0;padding:0;outline:none;transition:box-shadow .15s}
.color-btn:active{box-shadow:0 0 0 1.5px #222}
.slider-wrap{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
input[type=range]{flex:1;min-width:40px;height:24px;-webkit-appearance:none;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:#ddd;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#222;margin-top:-6.5px;cursor:pointer}
.px-val{font-size:10px;color:#888;width:20px;text-align:right;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:7px;background:#f5f5f5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0}
.icon-btn:active{background:#e0e0e0}
.icon-btn.on{background:#222}
.icon-btn.on svg{stroke:#fff}
.icon-btn svg{width:18px;height:18px;stroke:#222;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.icon-btn.danger{background:#fee}
.icon-btn.danger:active{background:#fcc}
canvas{flex:1;display:block;background:#fff;touch-action:none}
/* Color wheel overlay */
.color-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;z-index:100;align-items:center;justify-content:center}
.color-overlay.show{display:flex}
.color-wheel{position:relative;width:180px;height:180px;animation:cw .15s ease-out}
@keyframes cw{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.color-dot{position:absolute;width:38px;height:38px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;transform:translate(-50%,-50%);transition:transform .1s}
.color-dot:active{transform:translate(-50%,-50%) scale(1.2)}
.color-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.8);box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* Ruler — vertical strips on left/right (long edges in portrait) */
#view-ruler{background:#fff}
.ruler-frame{flex:1;display:flex;flex-direction:row;position:relative}
.ruler-strip{width:36px;flex-shrink:0;background:#fff;overflow:hidden}
.ruler-strip svg{width:100%;height:100%;display:block}
.ruler-mid{flex:1;display:flex;align-items:center;justify-content:center;background:#fff;min-width:0}
.ruler-mid .info{color:#aaa;font-size:12px;text-align:center;padding:8px}
.ruler-mid .info b{color:#555;font-weight:600}
.ruler-mid .info .big{font-size:16px;color:#333;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
<div class="topbar" id="topbar">
<div class="back" id="backBtn"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></div>
<div class="title" id="topTitle">Tookies</div>
</div>
<div class="view" id="view-home">
<div class="home-header">Tookies</div>
<div class="home-sub">轻量小工具集 · 点击卡片进入</div>
<div class="grid" id="grid"></div>
</div>
<div class="view" id="view-paint">
<canvas id="cv"></canvas>
<div class="paint-toolbar">
<button class="color-btn" id="colorBtn"></button>
<div class="slider-wrap"><input type="range" id="size" min="1" max="30" value="2"><div class="px-val" id="sizeVal">2</div></div>
<button class="icon-btn" id="eraserBtn" title="橡皮"><svg viewBox="0 0 24 24"><path d="M16 4l4 4-9 9H7l-3-3 9-10z"/><line x1="8" y1="20" x2="20" y2="20"/></svg></button>
<button class="icon-btn" id="undoBtn" title="撤销"><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 1 1 0 10h-4"/></svg></button>
<button class="icon-btn" id="redoBtn" title="恢复"><svg viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 1 0 0 10h4"/></svg></button>
<button class="icon-btn danger" id="clearBtn" title="清屏"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
</div>
</div>
<div class="color-overlay" id="colorOverlay"><div class="color-wheel" id="colorWheel"></div></div>
<div class="view" id="view-ruler">
<div class="ruler-frame" id="rulerFrame">
<div class="ruler-strip"><svg id="rulerLeftSvg"></svg></div>
<div class="ruler-mid"><div class="info">
<div class="big">📐 屏幕尺</div>
<div>宽度 <b id="devW">—</b></div>
<div>高度 <b id="devH">—</b></div>
<div style="margin-top:4px">对角线 <b id="diag">—</b></div>
</div></div>
<div class="ruler-strip"><svg id="rulerRightSvg"></svg></div>
</div>
</div>
</div>
<script>
(function(){
'use strict';
var TOOLS=[
{id:'paint',label:'简易画板',icon:'<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="6" cy="6" r="1.5" fill="#222" stroke="none"/></svg>'},
{id:'ruler',label:'屏幕尺',icon:'<svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="5" rx="1"/><line x1="7" y1="2" x2="7" y2="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="17" y1="2" x2="17" y2="5"/><line x1="3" y1="7" x2="3" y2="22"/><line x1="6" y1="7" x2="6" y2="11"/><line x1="6" y1="15" x2="6" y2="19"/><line x1="6" y1="22" x2="6" y2="22"/></svg>'}
];
var grid=document.getElementById('grid');
TOOLS.forEach(function(t){var el=document.createElement('div');el.className='tile';el.innerHTML='<div class="tile-icon">'+t.icon+'</div><div class="tile-label">'+t.label+'</div>';el.addEventListener('click',function(){location.hash='#'+t.id;});grid.appendChild(el);});
var topbar=document.getElementById('topbar'),topTitle=document.getElementById('topTitle'),backBtn=document.getElementById('backBtn');
function show(v,t){[].forEach.call(document.querySelectorAll('.view'),function(e){e.classList.remove('active');});document.getElementById(v).classList.add('active');if(v==='view-home'){topbar.classList.add('hidden');}else{topbar.classList.remove('hidden');topTitle.textContent=t||'';}var tool=v==='view-home'?null:v.replace('view-','');if(tool==='paint')setTimeout(paintResize,0);if(tool==='ruler')setTimeout(rulerInit,0);location.hash=v==='view-home'?'':'#'+tool;}
backBtn.addEventListener('click',function(){show('view-home');});
function route(){var h=location.hash.replace('#','');if(h==='paint')show('view-paint','简易画板');else if(h==='ruler')show('view-ruler','屏幕尺');else show('view-home');}
window.addEventListener('hashchange',route);
/* ── Paint ── */
var cv,ctx,sizeEl,sizeVal,eraserBtn,colorBtn,colorOverlay,colorWheel;
var strokes=[],redoStack=[],current=null,drawing=false;
var currentColor='#000000',currentSize=2,isEraser=false;
var COLORS=['#000000','#e53935','#fb8c00','#fdd835','#43a047','#1e88e5','#8e24aa','#ffffff'];
function updateColorBtn(){colorBtn.style.background=currentColor;}
function paintResize(){cv=document.getElementById('cv');if(!cv)return;var r=cv.getBoundingClientRect();if(cv.width!==Math.floor(r.width)||cv.height!==Math.floor(r.height)){cv.width=Math.floor(r.width);cv.height=Math.floor(r.height);redrawAll();}}
function drawStroke(s){if(!s.points.length)return;ctx.strokeStyle=s.color;ctx.lineWidth=s.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(s.points[0].x,s.points[0].y);for(var i=1;i<s.points.length;i++)ctx.lineTo(s.points[i].x,s.points[i].y);if(s.points.length===1){ctx.arc(s.points[0].x,s.points[0].y,s.size/2,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();}else{ctx.stroke();}}
function redrawAll(){ctx.clearRect(0,0,cv.width,cv.height);for(var i=0;i<strokes.length;i++)drawStroke(strokes[i]);}
function getPos(e){var r=cv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function paintStart(e){e.preventDefault();drawing=true;redoStack.length=0;var p=getPos(e);current={color:isEraser?'#ffffff':currentColor,size:currentSize,points:[p]};strokes.push(current);drawStroke(current);}
function paintMove(e){if(!drawing)return;e.preventDefault();var p=getPos(e);var last=current.points[current.points.length-1];if(Math.abs(p.x-last.x)<1.5&&Math.abs(p.y-last.y)<1.5)return;current.points.push(p);ctx.strokeStyle=current.color;ctx.lineWidth=current.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();}
function paintEnd(e){if(!drawing)return;e&&e.preventDefault();drawing=false;if(current&¤t.points.length===0)strokes.pop();current=null;}
function setColor(c){currentColor=c;isEraser=false;eraserBtn.classList.remove('on');updateColorBtn();}
function setEraser(){isEraser=true;eraserBtn.classList.add('on');colorBtn.style.background='#fff';}
/* color wheel */
function buildWheel(){
colorWheel.innerHTML='';
var cx=90,cy=90,R=62;
COLORS.forEach(function(c,i){
var a=(i/COLORS.length)*Math.PI*2-Math.PI/2;
var dot=document.createElement('div');
dot.className='color-dot';dot.style.background=c;
dot.style.left=(cx+R*Math.cos(a))+'px';dot.style.top=(cy+R*Math.sin(a))+'px';
dot.addEventListener('click',function(e){e.stopPropagation();setColor(c);closeWheel();});
colorWheel.appendChild(dot);
});
var ind=document.createElement('div');ind.className='color-center';ind.id='wheelCenter';
colorWheel.appendChild(ind);
}
function updateWheelCenter(){var c=document.getElementById('wheelCenter');if(c)c.style.background=currentColor;}
function openWheel(){updateWheelCenter();colorOverlay.classList.add('show');}
function closeWheel(){colorOverlay.classList.remove('show');}
function paintInit(){
cv=document.getElementById('cv');ctx=cv.getContext('2d');
sizeEl=document.getElementById('size');sizeVal=document.getElementById('sizeVal');
eraserBtn=document.getElementById('eraserBtn');colorBtn=document.getElementById('colorBtn');
colorOverlay=document.getElementById('colorOverlay');colorWheel=document.getElementById('colorWheel');
undoBtn=document.getElementById('undoBtn');redoBtn=document.getElementById('redoBtn');clearBtn=document.getElementById('clearBtn');
updateColorBtn();buildWheel();
colorBtn.addEventListener('click',openWheel);
colorOverlay.addEventListener('click',closeWheel);
colorWheel.addEventListener('click',function(e){e.stopPropagation();});
sizeEl.addEventListener('input',function(){currentSize=parseInt(sizeEl.value,10);sizeVal.textContent=currentSize;});
eraserBtn.addEventListener('click',setEraser);
undoBtn.addEventListener('click',function(){if(strokes.length){redoStack.push(strokes.pop());redrawAll();}});
redoBtn.addEventListener('click',function(){if(redoStack.length){strokes.push(redoStack.pop());redrawAll();}});
clearBtn.addEventListener('click',function(){if(!strokes.length)return;if(confirm('确定清空画板？')){strokes.length=0;redoStack.length=0;redrawAll();}});
cv.addEventListener('touchstart',paintStart,{passive:false});cv.addEventListener('mousedown',paintStart);
cv.addEventListener('touchmove',paintMove,{passive:false});cv.addEventListener('mousemove',paintMove);
cv.addEventListener('touchend',paintEnd);cv.addEventListener('mouseup',paintEnd);cv.addEventListener('mouseleave',paintEnd);
window.addEventListener('resize',paintResize);paintResize();
}
/* ── Ruler ── */
/* On Android: 1 CSS px = 1 dp = 1/160 inch. So pxPerMm = 160/25.4 */
var PX_PER_MM=160/25.4; /* ≈6.299 */
function buildVRuler(svg,flip){
var frame=document.getElementById('rulerFrame');
var H=frame.clientHeight; /* CSS px height available */
var W=36; /* strip width */
svg.setAttribute('viewBox','0 0 '+W+' '+H);
svg.setAttribute('preserveAspectRatio','none');
var parts=[];
/* baseline: left ruler baseline at x=0, right ruler at x=W */
var baseX=flip?W:0;
/* tick direction: left → rightward(+), right → leftward(-) */
var dir=flip?-1:1;
parts.push('<line x1="'+baseX+'" y1="0" x2="'+baseX+'" y2="'+H+'" stroke="#999" stroke-width="0.5"/>');
var totalMm=Math.ceil(H/PX_PER_MM)+1;
for(var mm=0;mm<=totalMm;mm++){
var y=mm*PX_PER_MM;
if(y>H+1)break;
var major=(mm%10===0),minor=(mm%5===0);
var len=major?22:(minor?14:8);
var col=major?'#333':(minor?'#888':'#bbb');
var sw=major?0.8:(minor?0.5:0.3);
var x2=baseX+dir*len;
parts.push('<line x1="'+baseX+'" y1="'+y.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+col+'" stroke-width="'+sw+'"/>');
if(major){
var cm=mm/10;
/* number position: inside the strip, away from baseline */
var tx=flip?(W-len-3):(len+3);
var anchor=flip?'end':'start';
/* dominant-baseline central to vertically center on tick */
parts.push('<text x="'+tx+'" y="'+y.toFixed(1)+'" font-size="7" fill="#555" text-anchor="'+anchor+'" dominant-baseline="central" font-family="sans-serif">'+cm+'</text>');
}
}
svg.innerHTML=parts.join('');
}
function rulerInit(){
var dpr=window.devicePixelRatio||1;
var sw=window.screen.width,sh=window.screen.height;
var dpi=dpr*160;
var wIn=sw*dpr/dpi,hIn=sh*dpr/dpi; /* = sw/160, sh/160 */
var diag=Math.sqrt(wIn*wIn+hIn*hIn);
document.getElementById('devW').textContent=(sw/160*2.54).toFixed(1)+' cm';
document.getElementById('devH').textContent=(sh/160*2.54).toFixed(1)+' cm';
document.getElementById('diag').textContent=diag.toFixed(2)+'″ ('+(diag*2.54).toFixed(1)+' cm)';
buildVRuler(document.getElementById('rulerLeftSvg'),false);
buildVRuler(document.getElementById('rulerRightSvg'),true);
}
window.addEventListener('resize',function(){if(document.getElementById('view-ruler').classList.contains('active'))rulerInit();});
/* Boot */
var undoBtn,redoBtn,clearBtn;
paintInit();route();
})();
</script>
</body>
</html>
